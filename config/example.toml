# Example gr-ray-trace simulation config.
# Pass with: ./gr-ray-trace --config config/example.toml
#
# Any omitted key keeps its compiled-in default. This example also demonstrates
# a physical temperature scale, so edit the conversion factors for your data.

[black_hole]
mass = 1.0   # M_BH, geometric units
spin = 1.0   # a_BH; must satisfy |spin| <= mass, i.e. dimensionless spin a/M in [-1, 1] (|a/M| == 1 is extremal)

[camera]
use_pinhole = false
use_image = true

theta = 0.7853981633974483   # pi/4, pinhole camera polar angle
phi = 0.7853981633974483     # pi/4, pinhole camera azimuthal angle
target_r_min = 0.0
target_r_max = 2.0

plane_dim1 = 20.0           # image plane extent along theta_hat, in rg/c
plane_dim2 = 20.0           # image plane extent along phi_hat, in rg/c
plane_theta = 1.5707963267948966  # pi/2, image plane polar angle
plane_phi = 0.7853981633974483    # pi/4, image plane azimuthal angle

distance = 10000.0          # camera distance from origin, in rg/c

[photons]
count = 20                        # total photons traced, split across MPI ranks
# Used when both camera modes are false. One packet receives one sampled
# frequency; its I value is the represented packet energy in erg.
generator = "blackbody"           # blackbody, power-law, or custom
superphotons_per_cell = 4
energy_per_cell_erg = 1.0
# Power-law-only settings; uncomment when generator = "power-law".
# power_law_slope = 2.0           # dE/dnu proportional to nu^(-slope)
# nu_min_hz = 1.0e9
# nu_max_hz = 1.0e20
# Custom-generator example; uncomment when generator = "custom".
# custom_frequency_hz = 2.30e11
# Camera-created packets are monochromatic unless the camera initializer is customized.
camera_frequency_hz = 2.30e11
camera_packet_energy_erg = 1.0

[units]
# Multiply each NumPy value by its factor before photon generation. For example,
# Tgas=1 in the input means 1e10 K with the temperature factor below.
length_cm_per_code = 1.0
time_s_per_code = 1.0
density_g_cm3_per_code = 1.0
temperature_k_per_code = 1.0e10
four_velocity_cm_s_per_code = 2.99792458e10
magnetic_gauss_per_code = 1.0

[parallel]
# Number of partitions in [r, theta, phi]. One -1 is inferred from the MPI
# task count. The default below therefore partitions phi first.
decomposition = [1, 1, -1]

[integration]
max_steps = 10000
termination_percent = 0.9     # stop once this fraction of photons has terminated
initial_step = 0.1            # initial dlambda guess (scaled by camera_distance)
atol = 1e-8
rtol = 1e-8

[termination]
# Photons terminate once their Kerr-Schild radius leaves [r_min, r_max].
# Leave commented to default to R_HORIZON and 1.5*camera.distance respectively.
# r_min = 1.0
# r_max = 500.0

[output]
interval = 1                  # write one archive per rank every N steps
stride = 1                    # write every Nth rank-local photon
# Arrays included in each output_step_*.npz archive.
variables = ["id", "frequency", "x0", "x1", "x2", "x3", "k0", "k1", "k2", "k3", "I", "Q", "U", "V", "image_I", "image_Q", "image_U", "image_V", "lightcurve_I", "spectrum_frequency_hz", "spectrum_I"]
