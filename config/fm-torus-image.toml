# Example gr-ray-trace simulation config.
# Run with: ./gr-ray-trace config/example.toml
#
# Any omitted key keeps its compiled-in default. This example also demonstrates
# a physical temperature scale, so edit the conversion factors for your data.

[simulation]
mode = "disk"                    # image or disk

[input]
# Both image and disk modes require the fluid/disk grid.
# numpy_dir must contain r.npy, theta.npy, phi.npy, rho.npy, Tgas.npy, vel.npy, and mag.npy.
# Coordinate and scalar files have shape (nr, ntheta, nphi); spacing may vary.
vacuum = false
numpy_dir = "output"

[black_hole]
mass = 1.0   # M_BH, geometric units
spin = 0.9375   # a_BH; must satisfy |spin| <= mass, i.e. dimensionless spin a/M in [-1, 1] (|a/M| == 1 is extremal)

[camera]
theta = 0.7853981633974483  # camera polar angle
phi = 0.7853981633974483    # camera azimuthal angle
width = 5.0                # image plane extent along theta_hat, in rg/c
height = 5.0               # image plane extent along phi_hat, in rg/c
distance = 20.0          # camera distance from origin, in rg/c

[photons]
count = 20000000                        # global total, up to 100 billion, split across MPI ranks
# Disk mode emits packets in every cell. Image mode uses the same generator
# when a backward ray first reaches an emitting fluid cell.
generator = "blackbody"           # blackbody, power-law, or custom
superphotons_per_cell = 4
energy_per_cell_erg = 1.0
# Power-law-only settings; uncomment when generator = "power-law".
# power_law_slope = 2.0           # dE/dnu proportional to nu^(-slope)
# nu_min_hz = 1.0e9
# nu_max_hz = 1.0e20
# Custom-generator example; uncomment when generator = "custom".
# custom_frequency_hz = 2.30e11

[units]
# Multiply each NumPy value by its factor before photon generation. For example,
# Tgas=1 in the input means 1e10 K with the temperature factor below.
length_cm_per_code = 1.0
time_s_per_code = 1.0
density_g_cm3_per_code = 1.0
temperature_k_per_code = 1.0e10
four_velocity_cm_s_per_code = 2.99792458e10
magnetic_gauss_per_code = 1.0

[parallel]
# Number of partitions in [r, theta, phi]. One -1 is inferred from the MPI
# task count. The default below therefore partitions phi first.
decomposition = [1, 1, 1]

[integration]
integrator = "rk45"          # rk4 or rk45
max_steps = 10000
termination_percent = 0.9     # stop once this fraction of photons has terminated
initial_step = 0.005            # initial dlambda guess (scaled by camera_distance)
atol = 1e-10
rtol = 1e-10

[termination]
# Photons terminate once their Kerr-Schild radius leaves [r_min, r_max].
# Leave commented to default to R_HORIZON and 1.5*camera.distance respectively.
r_min = 1.0
r_max = 10.0

[output]
directory = "./output"
interval = 1                  # write one archive per rank every N steps
stride = 10                    # write every Nth rank-local photon
# Arrays included in each rank-local checkpoint. Image mode separately writes
# a globally reduced image_products.npz after integration.
variables = ["id", "frequency", "x0", "x1", "x2", "x3", "k0", "k1", "k2", "k3", "I", "Q", "U", "V", "terminate", "phase"]
image_nx = 256
image_ny = 256
spectrum_bins = 128
spectrum_min_hz = 1.0e8
spectrum_max_hz = 1.0e22

[scattering]
enabled = false
optical_depth = 0.0
albedo = 1.0                  # 1.0 scatters; 0.0 absorbs
seed = 12345

[radiative_transfer]
# Optical depth (absorption) only attenuates Stokes I/Q/U/V; emissivity only
# adds to Stokes I. Both are independent, user-editable extension points --
# see src/radiative_transfer/radiative_transfer.hpp for the default grey
# models (density-weighted opacity, density*temperature-weighted emission)
# and instructions for replacing them with physical coefficients.
absorption_enabled = false
emission_enabled = false
absorption_coefficient = 0.0  # scales the default grey opacity
emission_coefficient = 0.0    # scales the default grey emissivity
